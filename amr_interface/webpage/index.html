<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Robot Controller</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b1020;
      --panel: #141b2d;
      --panel-soft: #1a2238;
      --accent: #60a5fa;
      --accent-active: #f97316;
      --text: #e5e7eb;
      --muted: #94a3b8;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background: radial-gradient(circle at top, #101a35 0%, var(--bg) 45%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      height: 100%;
      overflow-x: hidden;
      overflow-y: auto;
      touch-action: pan-y;
    }

    header {
      padding: 12px 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(20, 27, 45, 0.88);
      border-bottom: 1px solid rgba(148, 163, 184, 0.18);
      backdrop-filter: blur(8px);
    }

    header h1 {
      font-size: 16px;
      margin: 0;
      font-weight: 650;
      letter-spacing: 0.2px;
    }

    .header-bar {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .header-bar a {
      color: var(--accent);
      text-decoration: none;
      font-size: 13px;
    }

    #status {
      font-size: 12px;
      color: var(--muted);
    }

    #status.ok {
      color: #4ade80;
    }

    #status.err {
      color: #f87171;
    }

    main {
      display: flex;
      flex-direction: column;
      min-height: calc(100% - 52px);
      padding: 16px;
      gap: 12px;
    }

    .section {
      background: var(--panel);
      border-radius: 16px;
      border: 1px solid rgba(148, 163, 184, 0.14);
      padding: 10px;
    }

    .section-title {
      margin: 0 0 10px;
      padding: 0 4px;
      font-size: 12px;
      letter-spacing: 0.35px;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 650;
    }

    .joysticks {
      flex: 1;
      display: flex;
      min-height: 280px;
    }

    .joystick-zone {
      flex: 1;
      background: var(--panel-soft);
      border-radius: 16px;
      position: relative;
      overflow: hidden;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      grid-template-areas: "left pulse right";
    }

    #btn-nudge-left {
      grid-area: left;
    }

    #btn-pulse {
      grid-area: pulse;
    }

    #btn-nudge-right {
      grid-area: right;
    }

    .row-2 {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .row-3 {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .hidden {
      display: none;
    }

    canvas {
      width: 100%;
      background: var(--panel-soft);
      border-radius: 10px;
      display: block;
    }

    button {
      background: var(--panel-soft);
      color: var(--text);
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 12px;
      padding: 16px 8px;
      font-size: 14px;
      font-weight: 650;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
    }

    button:active,
    button.active {
      background: var(--accent);
      border-color: var(--accent);
      transform: scale(0.98);
    }

    button.latch.active {
      background: var(--accent-active);
      border-color: var(--accent-active);
    }

    @media (max-width: 640px) {
      main {
        padding: 12px;
        gap: 10px;
      }

      .section {
        padding: 8px;
      }

      .joysticks {
        min-height: 220px;
      }

      button {
        padding: 14px 6px;
        font-size: 13px;
      }
    }
  </style>
</head>

<body>
  <header>
    <h1>Robot Controller</h1>
    <div class="header-bar">
      <a id="ros-log" href="#" target="_blank" rel="noopener">ROS Log</a>
      <span id="status">connecting...</span>
    </div>
  </header>
  <main>
    <section class="section">
      <h2 class="section-title">Mode</h2>
      <div class="row-2">
        <button id="btn-manual" class="latch active">MANUAL</button>
        <button id="btn-auto" class="latch">AUTO</button>
      </div>
    </section>

    <section id="authority-section" class="section hidden">
      <h2 class="section-title">Authority</h2>
      <div class="row-3">
        <button id="btn-user" class="latch active">USER</button>
        <button id="btn-robot" class="latch">ROBOT</button>
        <button id="btn-shared-control" class="latch">SHARED CONTROL</button>
      </div>
    </section>

    <section id="drive-section" class="section manual-only">
      <h2 class="section-title">Drive Motor</h2>
      <div class="joysticks">
        <div id="drive-joy" class="joystick-zone"></div>
      </div>
    </section>

    <section id="handle-section" class="section manual-only">
      <h2 class="section-title">Handle Motor</h2>
      <div class="buttons">
        <button id="btn-nudge-left" class="momentary">NUDGE LEFT</button>
        <button id="btn-pulse" class="momentary">PULSE</button>
        <button id="btn-nudge-right" class="momentary">NUDGE RIGHT</button>
      </div>
    </section>

    <section class="section">
      <h2 class="section-title">Odometry</h2>
      <canvas id="trajectory" width="600" height="400"></canvas>
    </section>
  </main>

  <script src="/nipplejs.js"></script>
  <script>
    (() => {
      const statusEl = document.getElementById("status");

      document.getElementById("ros-log").href = `${location.protocol}//${location.hostname}:8888/`;

      const trajectoryCanvas = document.getElementById("trajectory");
      const trajectoryCtx = trajectoryCanvas.getContext("2d");
      const trajectoryPoints = [];
      const TRAJECTORY_MAX = 2000;
      const TRAJECTORY_SCALE = 30;
      let trajectoryDirty = true;

      function drawTrajectory() {
        const c = trajectoryCanvas, ctx = trajectoryCtx;
        ctx.clearRect(0, 0, c.width, c.height);
        ctx.strokeStyle = "#334155";
        ctx.lineWidth = 1;
        for (let x = 0; x <= c.width; x += 40) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, c.height); ctx.stroke(); }
        for (let y = 0; y <= c.height; y += 40) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(c.width, y); ctx.stroke(); }

        if (!trajectoryPoints.length) return;
        const last = trajectoryPoints[trajectoryPoints.length - 1];
        const cx = c.width / 2, cy = c.height / 2;

        ctx.strokeStyle = "#60a5fa";
        ctx.lineWidth = 2;
        ctx.beginPath();
        trajectoryPoints.forEach((p, i) => {
          const px = cx - (p.y - last.y) * TRAJECTORY_SCALE;
          const py = cy - (p.x - last.x) * TRAJECTORY_SCALE;
          if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
        });
        ctx.stroke();

        const heading = -((last.o + 90) * Math.PI / 180.0);
        ctx.fillStyle = "#f97316";
        ctx.beginPath();
        ctx.moveTo(cx + Math.cos(heading) * 10, cy + Math.sin(heading) * 10);
        ctx.lineTo(cx + Math.cos(heading + 2.5) * 7, cy + Math.sin(heading + 2.5) * 7);
        ctx.lineTo(cx + Math.cos(heading - 2.5) * 7, cy + Math.sin(heading - 2.5) * 7);
        ctx.closePath();
        ctx.fill();
      }

      function tick() {
        if (trajectoryDirty) { drawTrajectory(); trajectoryDirty = false; }
        requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);

      let ws = null;
      let linear = 0.0;
      let angular = 0.0;
      let mode = "manual";
      let authority = "";

      function connect() {
        const proto = location.protocol === "https:" ? "wss:" : "ws:";
        ws = new WebSocket(`${proto}//${location.host}/ws`);
        ws.onopen = () => {
          statusEl.textContent = "connected";
          statusEl.className = "ok";
          send({ type: "mode", value: mode });
        };
        ws.onmessage = (event) => {
          let payload;
          try { payload = JSON.parse(event.data); } catch (_) { return; }
          if (payload.type === "topic" && payload.topic === "state") {
            const d = payload.data;
            trajectoryPoints.push({ x: d.position_x, y: d.position_y, o: d.orientation });
            if (trajectoryPoints.length > TRAJECTORY_MAX) trajectoryPoints.shift();
            trajectoryDirty = true;
          }
        };
        ws.onclose = () => {
          statusEl.textContent = "disconnected — retrying";
          statusEl.className = "err";
          setTimeout(connect, 1000);
        };
        ws.onerror = () => ws && ws.close();
      }

      function send(obj) {
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify(obj));
        }
      }

      function clampLinear(v) { return Math.max(-1, Math.min(1, v)); }

      function clampAngular(v) { return Math.max(-3, Math.min(3, v)); }

      function sendAxes() {
        send({ type: "axes", linear, angular });
      }

      const driveJoy = nipplejs.create({
        zone: document.getElementById("drive-joy"),
        mode: "static",
        position: { left: "50%", top: "50%" },
        color: "#60a5fa",
        size: 140,
      });
      driveJoy.on("move", (_, data) => {
        if (!data || !data.vector) return;
        linear = clampLinear(data.vector.y);
        angular = clampAngular(-data.vector.x * 3);
        sendAxes();
      });
      driveJoy.on("end", () => { linear = 0.0; angular = 0.0; sendAxes(); });

      function bindMomentary(id, payload) {
        const btn = document.getElementById(id);
        const press = (e) => {
          e.preventDefault();
          btn.classList.add("active");
          send({ type: "middle", ...payload });
        };
        const release = (e) => {
          e.preventDefault();
          btn.classList.remove("active");
        };
        btn.addEventListener("pointerdown", press);
        btn.addEventListener("pointerup", release);
        btn.addEventListener("pointerleave", release);
        btn.addEventListener("pointercancel", release);
      }

      bindMomentary("btn-pulse", { mode: "pulse", action: "none" });
      bindMomentary("btn-nudge-left", { mode: "nudge", action: "left" });
      bindMomentary("btn-nudge-right", { mode: "nudge", action: "right" });

      const manualBtn = document.getElementById("btn-manual");
      const autoBtn = document.getElementById("btn-auto");
      const driveSection = document.getElementById("drive-section");
      const handleSection = document.getElementById("handle-section");
      const authoritySection = document.getElementById("authority-section");
      function setMode(value) {
        mode = value;
        if (value !== "auto") {
          clearAuthoritySelection();
        }
        manualBtn.classList.toggle("active", value === "manual");
        autoBtn.classList.toggle("active", value === "auto");
        driveSection.classList.toggle("hidden", value !== "manual");
        handleSection.classList.toggle("hidden", value !== "manual");
        authoritySection.classList.toggle("hidden", value !== "auto");
        send({ type: "mode", value });
      }
      manualBtn.addEventListener("click", () => setMode("manual"));
      autoBtn.addEventListener("click", () => setMode("auto"));

      const userBtn = document.getElementById("btn-user");
      const robotBtn = document.getElementById("btn-robot");
      const sharedControlBtn = document.getElementById("btn-shared-control");
      function clearAuthoritySelection() {
        authority = "";
        userBtn.classList.remove("active");
        robotBtn.classList.remove("active");
        sharedControlBtn.classList.remove("active");
      }

      function setAuthority(value) {
        authority = value;
        userBtn.classList.toggle("active", value === "user");
        robotBtn.classList.toggle("active", value === "robot");
        sharedControlBtn.classList.toggle("active", value === "shared");
        send({ type: "authority", value });
      }
      userBtn.addEventListener("click", () => setAuthority("user"));
      robotBtn.addEventListener("click", () => setAuthority("robot"));
      sharedControlBtn.addEventListener("click", () => setAuthority("shared"));

      setAuthority("");
      setMode("manual");
      connect();
    })();
  </script>
</body>

</html>
