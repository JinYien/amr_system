tuner:
  topics:
    gain: "/tuner/gain"
    command: "/tuner/command"
    teensy: "/tuner/teensy"

  rates:
    serial_read: 1000 # Hz
    drive_command: 100 # Hz
    ros_spin_interval: 10 # ms

  serial:
    identifier: "VID:PID=16C0:0483"
    baudrate: 115200
    timeout: 0.01 # s
    boot_delay: 1.0 # s
    gain_apply_delay: 0.5 # s

  window:
    width: 1400 # px
    height: 950 # px
    x: 100 # px
    y: 100 # px
    left_panel: 75 # %
    right_panel: 35 # %
    gui_update_interval: 1 # ms

  pid_gain:
    min: 0.0
    max: 500.0
    step: 0.001
    decimals: 5

  velocity:
    min: -1000.0 # deg/s
    max: 1000.0 # deg/s
    slider_scale: 1
    slider_tick_interval: 200
    step: 1.0
    decimals: 2

  wheel:
    min_radius: 0.001 # m
    max_radius: 1.0 # m
    radius_step: 0.001
    radius_decimals: 3
    default_radius: 0.108 # m

  linear_velocity:
    min: -100.0 # m/s
    max: 100.0 # m/s
    step: 0.1
    decimals: 2

  graph:
    decimal_precision: 3
    min_time_window: 0.0 # s
    max_time_window: 300.0 # s
    time_window_step: 5.0 # s
    time_window_decimals: 0
    default_time_window: 0.0 # s
    amplitude_sample_size: 100

  analysis:
    min_valid_period: 0.1 # s
    max_valid_period: 10.0 # s
    peak_detection_window: 5
    min_oscillation_periods: 2
    average_period_window: 5
