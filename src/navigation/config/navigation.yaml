amcl:
  ros__parameters:
    use_sim_time: false
    global_frame_id: "map"
    odom_frame_id: "odom"
    base_frame_id: "base_link"
    scan_topic: "/livox/scan"
    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    set_initial_pose: true
    initial_pose:
      x: 0.0
      y: 0.0
      z: 0.0
      yaw: 0.0
    alpha1: 0.02
    alpha2: 0.02
    alpha3: 0.02
    alpha4: 0.02
    alpha5: 0.02
    laser_model_type: "likelihood_field"
    laser_likelihood_max_dist: 2.0
    laser_max_range: 30.0
    laser_min_range: -1.0
    max_beams: 60
    min_particles: 500
    max_particles: 2000
    update_min_a: 0.15
    update_min_d: 0.15
    resample_interval: 1
    transform_tolerance: 0.5
    recovery_alpha_slow: 0.0
    recovery_alpha_fast: 0.0
    pf_err: 0.05
    pf_z: 0.99
    z_hit: 0.45
    z_max: 0.05
    z_rand: 0.5
    sigma_hit: 0.2
    tf_broadcast: true

map_server:
  ros__parameters:
    use_sim_time: false
    yaml_filename: ""

planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 5.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.25
      use_astar: false
      allow_unknown: true

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["goal_checker"]
    controller_plugins: ["FollowPath"]
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.3
      movement_time_allowance: 8.0
    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.15
      yaw_goal_tolerance: 0.2
      stateful: true
    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.3
      lookahead_dist: 0.4
      min_lookahead_dist: 0.25
      max_lookahead_dist: 0.6
      lookahead_time: 1.5
      use_velocity_scaled_lookahead_dist: true
      transform_tolerance: 0.2
      min_approach_linear_velocity: 0.05
      approach_velocity_scaling_dist: 0.6
      use_collision_detection: false
      max_allowed_time_to_collision_up_to_carrot: 2.0
      use_regulated_linear_velocity_scaling: true
      use_cost_regulated_linear_velocity_scaling: false
      regulated_linear_scaling_min_radius: 0.45
      regulated_linear_scaling_min_speed: 0.1
      use_rotate_to_heading: true
      rotate_to_heading_min_angle: 0.785
      rotate_to_heading_angular_vel: 0.8
      max_angular_accel: 1.0
      allow_reversing: false
      max_robot_pose_search_dist: 10.0

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      width: 5
      height: 5
      resolution: 0.025
      footprint: "[[0.25, 0.25], [0.25, -0.25], [-0.25, -0.25], [-0.25, 0.25]]"
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /livox/scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          inf_is_valid: true
          raytrace_max_range: 5.5
          raytrace_min_range: 0.0
          obstacle_max_range: 4.5
          obstacle_min_range: 0.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.25
      always_send_full_costmap: true
      # local costmap inflation stays at the inscribed radius (0.25): its job
      # is collision checking, not centring; keeping it minimal leaves the
      # 0.60 m gaps clear so the controller can thread them while it follows
      # the already-centred global path

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 3.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      resolution: 0.025
      track_unknown_space: true
      footprint: "[[0.25, 0.25], [0.25, -0.25], [-0.25, -0.25], [-0.25, 0.25]]"
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /livox/scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          inf_is_valid: true
          raytrace_max_range: 5.5
          raytrace_min_range: 0.0
          obstacle_max_range: 4.5
          obstacle_min_range: 0.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 2.5
        inflation_radius: 0.55
      always_send_full_costmap: true
      # global costmap inflation is wide (0.55 > the 0.50 half-width of a 1.0 m
      # corridor) with a gentle decay (2.5) so the low-cost minimum sits on the
      # corridor centre line: the planned path then runs down the middle and the
      # robot stops hugging a wall. It still threads the 0.60 m gaps because the
      # gap centre (0.30 m from each wall) stays below the lethal cost, so the
      # planner keeps a thin drivable channel through the middle of every gap

behavior_server:
  ros__parameters:
    use_sim_time: false
    local_costmap_topic: local_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_costmap_topic: global_costmap/costmap_raw
    global_footprint_topic: global_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"
    local_frame: odom
    global_frame: map
    robot_base_frame: base_link
    transform_tolerance: 0.2
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.2
    rotational_acc_lim: 1.0

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 20
    navigators: ["navigate_to_pose", "navigate_through_poses"]

velocity_smoother:
  ros__parameters:
    use_sim_time: false
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: "OPEN_LOOP"
    max_velocity: [0.3, 0.0, 1.0]
    min_velocity: [-0.3, 0.0, -1.0]
    max_accel: [0.5, 0.0, 1.0]
    max_decel: [-0.7, 0.0, -1.0]
    odom_topic: "/odom"
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0

# ---------------------------------------------------------------------------
# nav2 parameters, this file must keep the ros__parameters layout
#
# amcl (localization on the saved map)
#   scan_topic / frames    : must match the fastlio bridge and URDF
#   set_initial_pose       : the robot is assumed to start where mapping
#                            started (map origin); if it starts elsewhere,
#                            give it a 2D Pose Estimate in RViz
#   alpha1..alpha5         : odometry motion-model noise; kept very low (0.02)
#                            because Fast-LIO odometry is accurate AND because
#                            the serpentine (z-z-z) route is self-similar: every
#                            leg looks identical to the laser, so a wide particle
#                            cloud can spread sideways onto the neighbouring
#                            parallel leg, match it just as well, and make the
#                            pose snap over by one leg spacing (the "teleport").
#                            Low alphas keep the cloud tight around the odometry
#                            prediction so it never reaches the adjacent leg;
#                            on identical geometry only odometry continuity can
#                            tell the legs apart, so lean hard on it. This is the
#                            main teleport lever; if it still jumps the map is
#                            too repetitive to localize on by scan alone and the
#                            fix is upstream (add a distinguishing feature to the
#                            environment, or trust Fast-LIO odometry directly)
#   recovery_alpha_slow/fast : global particle re-injection when the match goes
#                            bad; MUST stay 0.0 on this route. If enabled, a
#                            poor match would scatter particles across the map
#                            and one would latch onto a look-alike leg, causing
#                            exactly the teleport we are preventing. If the robot
#                            genuinely loses localization, re-seed it with a 2D
#                            Pose Estimate from the webpage instead
#   laser_likelihood_max_dist : obstacle smear in the likelihood field; kept at
#                            2.0 (smooth) on purpose. A sharp field would score a
#                            slightly-misaligned correct pose lower than a
#                            perfectly-aligned wrong-leg pose and encourage the
#                            jump; the smooth field is forgiving of the correct
#                            pose so it is not out-weighted by a look-alike leg
#   z_hit / z_rand         : measurement mix; only LIGHTLY muted (z_hit 0.45,
#                            z_rand 0.5 versus the 0.5/0.5 default). The heavy
#                            mute (0.3/0.65) is not needed because the real cause
#                            of the turn-time teleport was Fast-LIO drifting under
#                            fast rotation, now fixed by easing the angular
#                            acceleration; with the odometry trustworthy through
#                            the turns, AMCL is allowed to correct almost normally
#                            and only the small dilution guards against snapping
#                            to a look-alike leg. Lower z_hit toward 0.3 again if
#                            it still jumps, raise to 0.5 on a non-repetitive map
#   update_min_d/a         : motion needed before AMCL runs a measurement update;
#                            0.15 m / 0.15 rad, slightly less frequent than the
#                            0.1 default as a mild guard; between updates the pose
#                            follows Fast-LIO odometry
#   max_beams              : scan rays used for matching; increase for
#                            better localization at more CPU
#   min/max_particles      : particle cloud size; increase for robustness
#                            at more CPU, decrease to save CPU
#
# map_server
#   yaml_filename : filled in by the launch file with map/map.yaml
#
# planner_server (global path)
#   tolerance     : how close the plan end must be to the goal
#   allow_unknown : plan through unexplored map cells
#
# controller_server (path following)
#   FollowPath is a Regulated Pure Pursuit controller: it tracks the global
#   path exactly (which the global inflation keeps on the corridor centre
#   line), slows down for curvature, and rotates in place at sharp corners.
#   It replaced the DWB sampling controller (in git history) because DWB
#   stalled at the serpentine U-turns: at a hairpin the path doubles back,
#   nearly every sampled trajectory scores badly and the oscillation critic
#   blocks the alternating rotations, so the robot sat there unable to judge
#   the turn. RPP has no sampling to disagree with itself: reaching a corner
#   it stops and rotates to the new heading, then drives on. It is also far
#   lighter on CPU than DWB's 800 trajectories x 20 Hz.
#   avoidance of unmapped obstacles now happens in the PLANNER, not the
#   controller: the live scan marks the obstacle in the global costmap, the
#   behavior tree replans at 2 Hz against a global costmap that updates at
#   3 Hz, so the detour starts while the robot is still approaching the
#   obstacle; RPP's own collision detection stops the robot before anything
#   the replan has not caught yet. If an obstacle leaves no side gap wider
#   than the 0.5 m robot there is no path at all: the robot backs up,
#   retries, and after the retries run out the goal aborts and it waits for
#   a new START
#   desired_linear_vel      : cruise speed; keep equal to the smoother and
#                             web interface 0.3 m/s baseline
#   lookahead (min/max/time, velocity scaled) : how far ahead on the path the
#                             carrot sits; scaled with speed so slow corner
#                             driving tracks tightly (0.25 m) and cruise is
#                             smooth (up to 0.6 m); raise max for smoother
#                             lines in open space, lower min for tighter
#                             cornering
#   use_regulated_linear_velocity_scaling / min_radius : slows the robot in
#                             curves; radius 0.45 covers the serpentine
#                             U-turns so it eases through them instead of
#                             sweeping wide at full speed
#   use_cost_regulated_linear_velocity_scaling : off, the local costmap has
#                             no cost gradient (inflation = inscribed) so
#                             there is nothing useful to scale by
#   use_rotate_to_heading / min_angle / angular_vel : when the path direction
#                             jumps by more than 45 deg (a hairpin) the robot
#                             stops and rotates in place at 0.8 rad/s, gentle
#                             enough for Fast-LIO to track (fast rotation is
#                             what smeared its registration); lower the
#                             angular_vel if turning still loses tracking
#   max_angular_accel       : 1.0, matched to the smoother and behavior
#                             server so turns ramp gently everywhere
#   use_collision_detection : OFF on purpose. When on, RPP projects the
#                             footprint forward and treats any cell at or above
#                             the inscribed cost (253) under it as an imminent
#                             collision and commands a full stop. The route
#                             guarantees at least a 0.60 m width, so at the
#                             tightest gaps the robot centre is 0.30 m from each
#                             wall and the footprint edge is only 0.05 m away,
#                             well inside the 0.25 m inscribed band, so RPP would
#                             read a collision and freeze in exactly the gaps the
#                             robot can physically pass; after the progress
#                             checker times out it backs up, then freezes again,
#                             which is the "cannot avoid, reverses, then stops"
#                             behaviour. Obstacle avoidance does not depend on
#                             this check: both costmaps mark the live scan and the
#                             tree replans at 2 Hz, so the planned path already
#                             routes around obstacles and only runs through cells
#                             below the lethal cost. Turn it back on only if the
#                             route is widened so no gap is tighter than about
#                             1.0 m (footprint plus two inscribed radii)
#   allow_reversing         : off, the scan does not cover behind the robot
#   goal_checker tolerances : how close counts as arrived
#   movement_time_allowance : how long the robot may sit without moving
#                             required_movement_radius before it is declared
#                             stuck and recovery starts; lower to detect a
#                             stuck robot sooner, raise if slow careful
#                             driving gets aborted as a false stuck; 8.0 so
#                             the slow shuffle-and-align through a 0.60 m gap
#                             is not cut short and sent to recovery
#
# costmaps
#   both costmaps carry an obstacle layer fed by the live scan, so the
#   global planner reroutes around a person or box standing in the path
#   instead of planning straight through it and getting stuck; the
#   obstacle layer only marks and clears live returns (raytrace clearing
#   removes an obstacle once the scan sees past it) and never edits the
#   saved static map, so temporary obstacles do not stay burned in; set
#   the global obstacle_layer enabled to false to go back to a static
#   only global plan that ignores live obstacles
#   footprint        : robot body (0.48) plus 1 cm margin per side; the
#                      0.50 footprint has a 0.25 inscribed radius, so the
#                      hard (lethal) inflation band reaches 0.25 m from any
#                      wall regardless of inflation_radius; in a 0.60 m gap
#                      the centre sits 0.30 m from each wall, leaving only a
#                      ~0.10 m wide passable centre strip (robot centre must
#                      stay 0.25 to 0.35 m from each wall); keep in sync with
#                      the robot_system and fastlio_converter footprints
#   resolution       : costmap cell size; 0.025 so the narrowest target gap
#                      (~0.60 m with obstacles, ~1.0 m nominal) keeps its
#                      passable centre strip about 4 cells wide; at 0.05 the
#                      grid rounds that strip down to ~2 cells and cell
#                      alignment can swallow it so the planner refuses to
#                      thread it; raise to 0.05 to save CPU only if no route
#                      needs a gap near the 0.5 m footprint width
#   inflation_radius : the two costmaps deliberately use DIFFERENT values
#                      because they do different jobs:
#                      - global (0.55): shapes the planned path. Wider than the
#                        0.50 m half-width of a 1.0 m corridor so the whole
#                        corridor carries inflation cost with the minimum on the
#                        centre line; the planner then routes down the middle and
#                        the robot stops hugging a wall. It still threads the
#                        0.60 m gaps: the gap centre (0.30 m from each wall) stays
#                        below the lethal cost, so a thin drivable channel remains
#                        through the middle of every gap.
#                      - local (0.25 = inscribed): collision checking only.
#                        Kept minimal so it never floods the 0.60 m gaps; the
#                        pure pursuit controller threads the gap by tracking
#                        the already-centred global path.
#                      An earlier version set BOTH to 0.25, which is what made the
#                      robot hug walls: with no global gradient the path took the
#                      shortest line along the walls and DWB followed it there.
#   cost_scaling_factor : how fast the inflation cost decays from the wall; on
#                      the global costmap 2.5 spreads the gradient across the
#                      whole corridor so the centre line is a clear low point;
#                      raise it to concentrate cost nearer the walls (weaker
#                      centring), lower it for an even broader centre pull. On
#                      the local costmap it is inert (inflation is at the
#                      inscribed radius, so every cell is either lethal or free)
#   obstacle/raytrace_max_range : keep near the livox_driver max_range so
#                      the costmap forgets obstacles it can no longer see
#   inf_is_valid     : the converter publishes inf for scan bins with no
#                      return; true treats those beams as maximum range so
#                      they clear the costmap, otherwise they are discarded
#                      and a removed obstacle would never be cleared
#
# behavior_server (recovery when stuck)
#   spin, backup, drive_on_heading, wait behaviors available to the
#   navigate to pose behavior tree
#
# bt_navigator
#   runs two navigators: navigate_to_pose for a single goal (from RViz or
#   the /navigate_to_pose action) and navigate_through_poses for an ordered
#   list of poses (the webpage sends the picked waypoints followed by the
#   goal to /navigate_through_poses so the robot passes through each in
#   turn). The launch file points each at its own tree, config/
#   behavior_tree.xml and config/navigate_through_poses_bt.xml, both copies
#   of the nav2 default whose recovery actions all finish within 1 s (clear
#   costmaps, 0.15 m backup, 1 s wait) instead of the default 90 degree
#   spin and 5 s wait
#
# velocity_smoother
#   sits between the controller/behaviors and the robot, ramping velocity
#   changes at max_accel/max_decel so turning is smooth instead of jerky
#   smoothing_frequency : output rate; increase for finer ramps
#   max_accel/max_decel : [x, y, theta] limits; lower theta values give
#                         gentler turning, higher values react faster. The
#                         theta accel is held to 1.0 (matching the controller
#                         acc_lim_theta and behavior rotational_acc_lim) so the
#                         robot eases into a turn rather than snapping to the
#                         1.0 rad/s cap. Fast rotation smears the lidar sweep
#                         and spikes the IMU integration, which is what made
#                         Fast-LIO drift and the pose get lost at the serpentine
#                         U-turns while straight driving stayed clean; the peak
#                         turn rate is still 1.0 rad/s, only the ramp is gentler.
#                         Lower the theta accel or the 1.0 cap further if turns
#                         still lose tracking
# ---------------------------------------------------------------------------
