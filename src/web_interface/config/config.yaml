topics:
  joystick_publisher: "/interface/joystick"
  control_publisher: "/interface/control"
  sound_publisher: "/command/sound"
  initial_pose_publisher: "/initialpose"
  navigate_action: "/navigate_to_pose"
  navigate_through_action: "/navigate_through_poses"
  robot_pose_subscriber: "/amcl_pose"

sounds:
  goal_reached: "chime"

server:
  host: "0.0.0.0"
  port: 8090

logging:
  port: 8091
  rate: 20 # Hz
  path: "log"

motion:
  publish_rate: 20 # Hz
  max_linear_velocity: 0.3 # m/s
  max_angular_velocity: 1.0 # rad/s

# ---------------------------------------------------------------------------
# topics
#   joystick_publisher : manual drive input from the webpage joystick
#   control_publisher  : mode and authority state of the interface
#   sound_publisher    : sound clip requests from the webpage
#   initial_pose_publisher : localization reset for AMCL, sent from the
#                        webpage map when picking the start location
#   navigate_action    : Nav2 navigate to pose action, used when only a goal
#                        is picked; only accepted in auto mode with robot or
#                        mix authority
#   navigate_through_action : Nav2 navigate through poses action, used when
#                        one or more waypoints are picked; the webpage sends
#                        the waypoints followed by the goal and the robot
#                        passes through each in order to the goal
#   robot_pose_subscriber : AMCL pose of the robot, streamed to the webpage
#                        map so the live robot position is drawn on it
#
# sounds
#   goal_reached : sound played once when a navigation goal is reached,
#                  whether it was sent from the webpage or from RViz;
#                  "chime" and "beep" are generated by the sound_driver,
#                  any other name is a wav clip in its wav folder; leave
#                  empty to stay silent on arrival
#
# server
#   host : address the web server listens on, 0.0.0.0 for all interfaces
#   port : web server port, change if another service already uses it
#
# logging
#   a second webpage on the logging port records the experiment topics into
#   a csv; the LOG button on the control webpage jumps to it and its
#   CONTROL button jumps back (the /log and /control routes redirect
#   between the two ports, so the pages never hard-code a port number)
#   press START to begin (the time and distance columns start at
#   zero), STOP to download the csv and store it in the log folder as
#   date-time.csv; the page always shows the live raw values of the logged
#   topics; distance is the path length accumulated from the amcl pose; the
#   pose x, y, yaw and the mix user and robot times are written relative to
#   their values at START, so every csv starts from zero (the webpage keeps
#   showing the raw map frame values)
#   port : logging webpage port
#   rate : csv rows per second while recording; increase for finer time
#          resolution at bigger files, decrease for smaller files
#   path : folder for the stored csv files, inside the web_interface package
#
# motion
#   publish_rate         : joystick and control publish rate; increase for a
#                          more responsive robot at more message traffic,
#                          decrease to lighten the system but react slower
#   max_linear_velocity  : speed at full joystick deflection; increase for a
#                          faster robot, decrease for safer manual driving
#   max_angular_velocity : turn rate at full joystick deflection; increase for
#                          sharper turning, decrease for gentler turns
# ---------------------------------------------------------------------------
